<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>Teste de Áudio</title>
<style>
  body { font-family: monospace; background: #0b1020; color: #e2e8f0; padding: 2rem; }
  button { margin: 0.5rem; padding: 0.75rem 1.5rem; font-size: 1rem; cursor: pointer; border: none; border-radius: 8px; background: #c81e55; color: white; }
  button:hover { background: #a81848; }
  #log { margin-top: 1.5rem; background: #1e293b; padding: 1rem; border-radius: 8px; white-space: pre; font-size: 0.85rem; line-height: 1.6; max-height: 400px; overflow-y: auto; }
  .ok { color: #4ade80; }
  .err { color: #f87171; }
  .info { color: #93c5fd; }
</style>
</head>
<body>
<h2>Diagnóstico de Áudio — CGB Frota</h2>

<button onclick="testTone()">▶ Tocar Tom 440Hz (puro)</button>
<button onclick="testAmbient()">▶ Tocar ambient-bg.wav</button>
<button onclick="testMP3()">▶ Tocar MP3 narração</button>
<button onclick="testDevice()">▶ Info dispositivo</button>
<button onclick="clearLog()">Limpar</button>

<div id="log">Clique em um botão para iniciar o teste...\n</div>

<script>
let ctx = null

function log(msg, cls = '') {
  const el = document.getElementById('log')
  const line = cls ? `<span class="${cls}">${msg}</span>\n` : msg + '\n'
  el.innerHTML += line
  el.scrollTop = el.scrollHeight
}

function clearLog() {
  document.getElementById('log').innerHTML = ''
}

async function getCtx() {
  if (!ctx) {
    ctx = new AudioContext()
    log(`AudioContext criado — state: ${ctx.state}`, 'info')
  }
  if (ctx.state === 'suspended') {
    await ctx.resume()
    log(`AudioContext resumido — state: ${ctx.state}`, 'info')
  }
  return ctx
}

async function testTone() {
  log('\n=== TESTE: Tom 440Hz ===', 'info')
  try {
    const c = await getCtx()
    log(`ctx.state: ${c.state}`)
    log(`ctx.sampleRate: ${c.sampleRate}`)

    const osc = c.createOscillator()
    const gain = c.createGain()
    osc.frequency.value = 440
    gain.gain.value = 0.8
    osc.connect(gain)
    gain.connect(c.destination)
    osc.start()
    log('Tom iniciado por 2 segundos...', 'ok')
    setTimeout(() => { osc.stop(); log('Tom parado.', 'ok') }, 2000)
  } catch(e) {
    log('ERRO: ' + e.message, 'err')
  }
}

async function testAmbient() {
  log('\n=== TESTE: ambient-bg.wav ===', 'info')
  try {
    const c = await getCtx()
    log(`ctx.state: ${c.state}`)

    log('Fazendo fetch do arquivo...')
    const res = await fetch('/demo-narration/ambient-bg.wav?t=' + Date.now())
    log(`HTTP status: ${res.status} ${res.ok ? 'OK' : 'FALHOU'}`, res.ok ? 'ok' : 'err')
    if (!res.ok) return

    const arrayBuf = await res.arrayBuffer()
    log(`ArrayBuffer: ${arrayBuf.byteLength} bytes`)

    log('Decodificando...')
    let audioBuf
    try {
      audioBuf = await c.decodeAudioData(arrayBuf.slice(0))
    } catch(decodeErr) {
      log('ERRO DE DECODE: ' + decodeErr.message, 'err')
      log('→ O browser rejeitou o WAV. Problema no formato do arquivo.', 'err')
      return
    }
    log(`Decodificado: ${audioBuf.duration.toFixed(2)}s, ${audioBuf.numberOfChannels}ch, ${audioBuf.sampleRate}Hz`, 'ok')

    const data = audioBuf.getChannelData(0)
    const mid = Math.floor(audioBuf.sampleRate * 12)
    let peakMid = 0
    for (let i = mid; i < mid + audioBuf.sampleRate; i++) {
      const a = Math.abs(data[i] ?? 0)
      if (a > peakMid) peakMid = a
    }
    log(`Amplitude meio (12s): ${(peakMid * 100).toFixed(1)}%`)

    const gain = c.createGain()
    gain.gain.value = 1.0
    gain.connect(c.destination)

    const source = c.createBufferSource()
    source.buffer = audioBuf
    source.loop = true
    source.connect(gain)
    source.start(0)
    log('Tocando ambient por 4 segundos (gain=1.0)...', 'ok')
    setTimeout(() => {
      gain.gain.setValueAtTime(gain.gain.value, c.currentTime)
      gain.gain.linearRampToValueAtTime(0, c.currentTime + 0.5)
      setTimeout(() => { try { source.stop() } catch{} log('Parado.', 'ok') }, 600)
    }, 4000)
  } catch(e) {
    log('ERRO GERAL: ' + e.message, 'err')
    console.error(e)
  }
}

async function testDevice() {
  log('\n=== INFO DISPOSITIVO DE ÁUDIO ===', 'info')
  try {
    const c = await getCtx()
    log(`AudioContext sampleRate: ${c.sampleRate}`)
    log(`AudioContext state: ${c.state}`)
    log(`AudioContext sinkId: "${c.sinkId ?? 'não suportado'}"`)

    // Lista dispositivos de saída
    const devices = await navigator.mediaDevices.enumerateDevices()
    const outputs = devices.filter(d => d.kind === 'audiooutput')
    log(`\nDispositivos de saída (${outputs.length}):`)
    outputs.forEach((d, i) => {
      log(`  [${i}] id="${d.deviceId.slice(0,20)}..." label="${d.label || '(sem label)'}"`)
    })

    // Testa se AudioContext.sinkId pode ser configurado
    if ('setSinkId' in c) {
      log('\nsetSinkId suportado — context usa dispositivo: ' + (c.sinkId || 'padrão do sistema'))
    } else {
      log('\nsetSinkId NÃO suportado — usando dispositivo padrão do sistema')
    }

    // Toca tom por 1s para confirmar que o MESMO contexto produz som
    const osc = c.createOscillator()
    const g = c.createGain()
    osc.frequency.value = 880
    g.gain.value = 0.5
    osc.connect(g); g.connect(c.destination)
    osc.start(); setTimeout(() => osc.stop(), 1000)
    log('\nTom 880Hz por 1s — você deve ouvir agora.', 'ok')
  } catch(e) {
    log('ERRO: ' + e.message, 'err')
  }
}

async function testMP3() {
  log('\n=== TESTE: 01-selecionar-checklist.mp3 ===', 'info')
  try {
    const c = await getCtx()
    log(`ctx.state: ${c.state}`)

    const res = await fetch('/demo-narration/01-selecionar-checklist.mp3')
    log(`HTTP status: ${res.status} ${res.ok ? 'OK' : 'FALHOU'}`, res.ok ? 'ok' : 'err')
    if (!res.ok) return

    const arrayBuf = await res.arrayBuffer()
    log(`ArrayBuffer: ${arrayBuf.byteLength} bytes`)

    const audioBuf = await c.decodeAudioData(arrayBuf)
    log(`Decodificado: ${audioBuf.duration.toFixed(2)}s`, 'ok')

    const gain = c.createGain()
    gain.gain.value = 1.0
    gain.connect(c.destination)

    const source = c.createBufferSource()
    source.buffer = audioBuf
    source.connect(gain)
    source.start(0)
    source.onended = () => log('MP3 terminou.', 'ok')
    log('Tocando MP3...', 'ok')
  } catch(e) {
    log('ERRO: ' + e.message, 'err')
    console.error(e)
  }
}
</script>
</body>
</html>
